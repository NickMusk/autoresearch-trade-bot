services:
  - type: web
    name: autoresearch-trade-bot
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: PYTHONPATH=src python -m autoresearch_trade_bot.app
    healthCheckPath: /health
    envVars:
      - key: AUTORESEARCH_STATUS_URL
        value: https://raw.githubusercontent.com/NickMusk/autoresearch-trade-bot/render-state/status/main/latest_status.json
      - key: AUTORESEARCH_FAMILY_STATUS_URL_TEMPLATE
        value: https://raw.githubusercontent.com/NickMusk/autoresearch-trade-bot/render-state/status/{family_id}/latest_status.json
  - type: worker
    name: autoresearch-trade-bot-llm-worker
    runtime: python
    plan: pro
    region: frankfurt
    buildCommand: pip install '.[data]'
    startCommand: PYTHONPATH=src python -m autoresearch_trade_bot.llm_worker
    envVars:
      - key: AUTORESEARCH_LLM_DATA_ROOT
        value: /var/data/autoresearch/llm/data
      - key: AUTORESEARCH_LLM_STATE_ROOT
        value: /var/data/autoresearch/llm/state
      - key: AUTORESEARCH_LLM_ARTIFACT_ROOT
        value: /var/data/autoresearch/llm/artifacts
      - key: AUTORESEARCH_LLM_REPO_ROOT
        value: /var/data/autoresearch/llm/repo
      - key: AUTORESEARCH_LLM_CAMPAIGNS_ROOT
        value: /var/data/autoresearch/llm/campaigns
      - key: AUTORESEARCH_LLM_ACTIVE_CAMPAIGN_PATH
        value: /var/data/autoresearch/llm/active_campaign.txt
      - key: AUTORESEARCH_LLM_WORKTREES_ROOT
        value: /var/data/autoresearch/llm/worktrees
      - key: AUTORESEARCH_LLM_RESULTS_PATH
        value: /var/data/autoresearch/llm/results.tsv
      - key: AUTORESEARCH_LLM_REPO_URL
        value: https://github.com/NickMusk/autoresearch-trade-bot.git
      - key: AUTORESEARCH_LLM_BRANCH_NAME
        value: codex/autoresearch-crypto
      - key: AUTORESEARCH_STRATEGY_FAMILY
        value: momentum
      - key: AUTORESEARCH_LLM_MODEL_NAME
        value: gpt-5-mini
      - key: AUTORESEARCH_LLM_CYCLE_INTERVAL_SECONDS
        value: "120"
      - key: AUTORESEARCH_LLM_CAMPAIGN_REFRESH_INTERVAL_SECONDS
        value: "86400"
      - key: AUTORESEARCH_LLM_FAILURE_COOLDOWN_SECONDS
        value: "900"
      - key: AUTORESEARCH_LLM_TIMEOUT_FAILURE_COOLDOWN_SECONDS
        value: "180"
      - key: AUTORESEARCH_LLM_DEGRADED_FAILURE_THRESHOLD
        value: "3"
      - key: AUTORESEARCH_LLM_OPENAI_TIMEOUT_SECONDS
        value: "240"
      - key: AUTORESEARCH_LLM_OPENAI_MAX_RETRIES
        value: "2"
      - key: AUTORESEARCH_LLM_OPENAI_RETRY_BACKOFF_SECONDS
        value: "5.0"
      - key: AUTORESEARCH_LLM_MAX_MUTATIONS_PER_CYCLE
        value: "2"
      - key: AUTORESEARCH_LLM_RECENT_RESULTS_LIMIT
        value: "12"
      - key: AUTORESEARCH_LLM_HISTORY_WINDOW_DAYS
        value: "30"
      - key: AUTORESEARCH_LLM_CAMPAIGN_WINDOW_COUNT
        value: "1"
      - key: AUTORESEARCH_LLM_FAST_VALIDATION_WINDOW_DAYS
        value: "30"
      - key: AUTORESEARCH_LLM_FAST_VALIDATION_WINDOW_COUNT
        value: "3"
      - key: AUTORESEARCH_LLM_FAST_VALIDATION_REFRESH_INTERVAL_SECONDS
        value: "21600"
      - key: AUTORESEARCH_LLM_ROLLOUT_VALIDATION_WINDOW_DAYS
        value: "30"
      - key: AUTORESEARCH_LLM_ROLLOUT_VALIDATION_WINDOW_COUNT
        value: "12"
      - key: AUTORESEARCH_LLM_ROLLOUT_VALIDATION_REFRESH_INTERVAL_SECONDS
        value: "86400"
      - key: AUTORESEARCH_LLM_ROLLOUT_CANDIDATE_SHORTLIST_SIZE
        value: "3"
      - key: AUTORESEARCH_SYMBOLS
        value: BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT
      - key: AUTORESEARCH_EXCHANGE
        value: binance
      - key: AUTORESEARCH_MARKET
        value: usdm_futures
      - key: AUTORESEARCH_INCLUDE_OPEN_INTEREST
        value: "0"
      - key: AUTORESEARCH_TIMEFRAME
        value: 5m
      - key: AUTORESEARCH_MIN_REQUEST_INTERVAL_SECONDS
        value: "0.5"
      - key: AUTORESEARCH_RATE_LIMIT_MAX_RETRIES
        value: "8"
      - key: AUTORESEARCH_RATE_LIMIT_BACKOFF_SECONDS
        value: "3.0"
      - key: AUTORESEARCH_TARGET_MIN_SHARPE
        value: "1.0"
      - key: AUTORESEARCH_TARGET_MAX_DRAWDOWN
        value: "0.20"
      - key: AUTORESEARCH_TARGET_MIN_ACCEPTANCE_RATE
        value: "0.60"
      - key: AUTORESEARCH_STATUS_GITHUB_REPO
        value: NickMusk/autoresearch-trade-bot
      - key: AUTORESEARCH_STATUS_GITHUB_BRANCH
        value: render-state
      - key: AUTORESEARCH_STATUS_GITHUB_PATH
        value: status/main
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: autoresearch-trade-bot-llm-worker-disk
      mountPath: /var/data
      sizeGB: 5
